name: Build Cross-Platform Executables

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk
        python -m pip install --upgrade pip
        pip install -r requirements.txt pyinstaller
    - name: Build executable
      run: |
        python -m PyInstaller --name ImageEditor --onefile --windowed --clean --noconfirm --collect-all PIL main.py
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ImageEditor-linux
        path: dist/ImageEditor

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt pyinstaller
    - name: Build executable
      run: |
        python -m PyInstaller --name ImageEditor --onefile --windowed --clean --noconfirm --collect-all PIL main.py
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ImageEditor-windows
        path: dist/ImageEditor.exe

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt pyinstaller
    - name: Build executable
      run: |
        python -m PyInstaller --name ImageEditor --onefile --windowed --clean --noconfirm --collect-all PIL main.py
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ImageEditor-macos
        path: dist/ImageEditor
