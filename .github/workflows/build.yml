name: Build and Release Cross-Platform Executables

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk
        python -m pip install --upgrade pip
        pip install -r requirements.txt pyinstaller
    - name: Build executable
      run: |
        python -m PyInstaller --name ImageEditor --onefile --windowed --clean --noconfirm --collect-all PIL main.py
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ImageEditor-linux
        path: dist/ImageEditor

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt pyinstaller
    - name: Build executable
      run: |
        python -m PyInstaller --name ImageEditor --onefile --windowed --clean --noconfirm --collect-all PIL main.py
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ImageEditor-windows
        path: dist/ImageEditor.exe

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt pyinstaller
    - name: Build executable
      run: |
        python -m PyInstaller --name ImageEditor --onefile --windowed --clean --noconfirm --collect-all PIL main.py
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ImageEditor-macos
        path: dist/ImageEditor

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download Linux artifact
      uses: actions/download-artifact@v4
      with:
        name: ImageEditor-linux
        path: artifacts/linux

    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: ImageEditor-windows
        path: artifacts/windows

    - name: Download macOS artifact
      uses: actions/download-artifact@v4
      with:
        name: ImageEditor-macos
        path: artifacts/macos

    - name: Generate Release Notes
      id: release_notes
      run: |
        VERSION="v0.1.0-build.${{ github.run_number }}"
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        {
          echo "## What's New"
          echo ""
          git log --pretty=format:"- %s (%h)" --no-merges -10 || echo "- See commit history for details"
          echo ""
          echo "## Downloads"
          echo ""
          echo "| Platform | File |"
          echo "|----------|------|"
          echo "| Linux | \`ImageEditor\` |"
          echo "| Windows | \`ImageEditor.exe\` |"
          echo "| macOS | \`ImageEditor\` |"
          echo ""
          echo "## SHA256 Checksums"
          echo '```'
          sha256sum artifacts/linux/ImageEditor artifacts/windows/ImageEditor.exe artifacts/macos/ImageEditor || true
          echo '```'
        } > release_notes.md
        cat release_notes.md

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.release_notes.outputs.version }}
        name: Release ${{ steps.release_notes.outputs.version }}
        body_path: release_notes.md
        files: |
          artifacts/linux/ImageEditor
          artifacts/windows/ImageEditor.exe
          artifacts/macos/ImageEditor
        generate_release_notes: true
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
