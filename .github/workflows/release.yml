name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v0.1.0'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk
        python -m pip install --upgrade pip
        pip install -r requirements.txt pyinstaller
    - name: Build executable
      run: |
        python -m PyInstaller --name ImageEditor --onefile --windowed --clean --noconfirm --collect-all PIL main.py
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ImageEditor-linux
        path: dist/ImageEditor

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt pyinstaller
    - name: Build executable
      run: |
        python -m PyInstaller --name ImageEditor --onefile --windowed --clean --noconfirm --collect-all PIL main.py
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ImageEditor-windows
        path: dist/ImageEditor.exe

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt pyinstaller
    - name: Build executable
      run: |
        python -m PyInstaller --name ImageEditor --onefile --windowed --clean --noconfirm --collect-all PIL main.py
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ImageEditor-macos
        path: dist/ImageEditor

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Determine version
      id: version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION="${{ github.ref_name }}"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Releasing $VERSION"

    - name: Download Linux artifact
      uses: actions/download-artifact@v4
      with:
        name: ImageEditor-linux
        path: artifacts/linux

    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: ImageEditor-windows
        path: artifacts/windows

    - name: Download macOS artifact
      uses: actions/download-artifact@v4
      with:
        name: ImageEditor-macos
        path: artifacts/macos

    - name: Make Linux/macOS executables executable
      run: |
        chmod +x artifacts/linux/ImageEditor
        chmod +x artifacts/macos/ImageEditor

    - name: Generate Release Notes
      id: release_notes
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        {
          echo "## What's New"
          echo ""
          # Get commits since last tag, or last 10 if no previous tag
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            git log --pretty=format:"- %s (%h)" "$LAST_TAG..HEAD" --no-merges || echo "- See commit history for details"
          else
            git log --pretty=format:"- %s (%h)" --no-merges -10 || echo "- See commit history for details"
          fi
          echo ""
          echo "## Downloads"
          echo ""
          echo "| Platform | File |"
          echo "|----------|------|"
          echo "| Linux | \`ImageEditor\` |"
          echo "| Windows | \`ImageEditor.exe\` |"
          echo "| macOS | \`ImageEditor\` |"
          echo ""
          echo "## SHA256 Checksums"
          echo '```'
          sha256sum artifacts/linux/ImageEditor artifacts/windows/ImageEditor.exe artifacts/macos/ImageEditor || true
          echo '```'
          echo ""
          echo "## Installation"
          echo ""
          echo "**Linux/macOS:** Download the executable, make it runnable with \`chmod +x ImageEditor\`, then run \`./ImageEditor\`."
          echo ""
          echo "**Windows:** Download \`ImageEditor.exe\` and double-click to run."
        } > release_notes.md
        cat release_notes.md

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.version }}
        name: ${{ steps.version.outputs.version }}
        body_path: release_notes.md
        files: |
          artifacts/linux/ImageEditor
          artifacts/windows/ImageEditor.exe
          artifacts/macos/ImageEditor
        generate_release_notes: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
